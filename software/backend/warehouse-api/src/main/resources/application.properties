# ============================================================
# SMART WAREHOUSE IoT SYSTEM - APPLICATION CONFIGURATION
# ============================================================

# Application Name
spring.application.name=warehouse-api

# Server Port
server.port=8080

# ============================================================
# PostgreSQL Database Configuration
# ============================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/warehouse_db
spring.datasource.username=postgres
spring.datasource.password=MinhHieu2816@
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================
# JPA / Hibernate Configuration
# ============================================================
# validate: Validate schema, don't make changes (recommended for production)
# update: Update schema if needed (useful for development)
# create: Create schema, destroying previous data
# create-drop: Create schema and drop when SessionFactory closes
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in console (disable in production)
spring.jpa.show-sql=true

# Format SQL queries for readability
spring.jpa.properties.hibernate.format_sql=true

# PostgreSQL Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ============================================================
# Logging Configuration
# ============================================================
# Root logging level
logging.level.root=INFO

# Application logging level
logging.level.com.warehouse=DEBUG

# SQL logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Log pattern
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ============================================================
# Jackson JSON Configuration
# ============================================================
# Date/Time format for JSON responses
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Asia/Ho_Chi_Minh

# Don't serialize null values
spring.jackson.default-property-inclusion=non_null

# ============================================================
# Server Configuration
# ============================================================
# Enable response compression (exclude multipart for camera stream)
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain

# Async request timeout for streaming (5 minutes)
spring.mvc.async.request-timeout=300000

# Tomcat connection settings for long-running streams
server.tomcat.connection-timeout=300000
server.tomcat.keep-alive-timeout=300000
